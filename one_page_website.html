<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Page Website</title>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to My One Page Website</h1>
        <p>This is the home section of my website.</p>
    </section>

    <!-- Gallery Section -->
    <section id="gallery">
        <h2>Photo Gallery</h2>
        <img src="image1.jpg" alt="Image 1" width="250">
        <img src="image2.jpg" alt="Image 2" width="250">
        <img src="image3.jpg" alt="Image 3" width="250">
    </section>

    <!-- Video Section -->
    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="YouTube video player"
            allowfullscreen>
        </iframe>
    </section>

    <!-- Contact Form -->
    <section id="contact">
        <h2>Contact Us</h2>

        <form>
            <input type="text" placeholder="Name"><br><br>
            <input type="email" placeholder="Email"><br><br>
            <input type="text" placeholder="Message"><br><br>
            <input type="submit" value="Submit">
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My One Page Website</p>
    </footer>

</body>
</html>
