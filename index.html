<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Page Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My One-Page Website</h1>
    </header>

    <nav>
        <a href="#gallery">Gallery</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="gallery">
        <h2>Gallery</h2>

        <div class="gallery">
            <img src="images/photo1.png" alt="Photo 1" onclick="openModal(this.src)">
            <img src="images/photo2.png" alt="Photo 2" onclick="openModal(this.src)">
            <img src="images/photo3.png" alt="Photo 3" onclick="openModal(this.src)">
        </div>
    </section>

    <section id="about">
        <h2>About</h2>
        <p>
            This website includes a functional lightbox gallery created using
            HTML, CSS, and JavaScript.
        </p>
    </section>

    <section id="contact">
        <h2>Contact</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <br><br>

            <input type="email" placeholder="Your Email" required>
            <br><br>

            <textarea rows="5"
                placeholder="Hello, thank you for visiting my website. If you have any questions or would like more information, please leave a message."
                required></textarea>
            <br><br>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <div id="modal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img id="modalImg" class="modal-content" alt="Large Image">
    </div>

    <script src="script.js"></script>

</body>

</html>
